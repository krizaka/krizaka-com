<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFDD6A" />
      <stop offset="50%" stop-color="#FF9A4A" />
      <stop offset="100%" stop-color="#FF5E6C" />
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="45%" stop-color="#FFDCA3" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" rx="20" fill="none" />

  <!-- outer ring -->
  <circle cx="60" cy="60" r="44" stroke="url(#g1)" stroke-width="2.5" fill="none" opacity="0.14" />
  <circle cx="60" cy="60" r="34" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none" />

  <!-- central emblem -->
  <g filter="url(#fGlow)">
    <path d="M60 30 C72 30 82 40 82 52 C82 64 72 74 60 74 C48 74 38 64 38 52 C38 40 48 30 60 30 Z" fill="url(#g1)" />
    <circle cx="60" cy="52" r="9" fill="#FFF" opacity="0.95" />
    <circle cx="60" cy="52" r="5.5" fill="#FF5E6C" opacity="0.95" />
  </g>

  <!-- orbit accents -->
  <path d="M24 60 A36 36 0 0 1 96 60" stroke="#FFB98A" stroke-width="1" stroke-linecap="round" opacity="0.18" fill="none" />
  <path d="M36 30 A54 54 0 0 0 84 30" stroke="#FF9A4A" stroke-width="1" stroke-linecap="round" opacity="0.06" fill="none" />

  <!-- subtle sheen -->
  <rect x="8" y="8" width="104" height="104" rx="18" fill="url(#g2)" opacity="0.14" />
</svg>
